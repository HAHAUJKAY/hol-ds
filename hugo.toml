baseURL = 'https://hahaujkay.github.io/hol-ds/'
languageCode = 'zh-cn'
title = '我的博客'
theme = 'hextra'

# 启用标签和分类
[taxonomies]
  tag = "tags"
  category = "categories"

# 启用原始 HTML 支持
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# 主题配置
[params]
  description = '记录生活，分享思考'
  
  # 导航菜单
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "故事"
    url = "/stories/"
    weight = 2

  [[menu.main]]
    name = "港口"
    url = "/harbor/"
    weight = 3

  [[menu.main]]
    name = "关于本站"
    url = "/about/"
    weight = 4

  [[menu.main]]
    name = "总结-论坛"
    url = "/forum/"
    weight = 5